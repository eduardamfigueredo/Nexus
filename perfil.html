<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagem/favicon.ico" type="image/x-icon">
    <title>Nexus | Meu Perfil</title>
    <link rel="stylesheet" href="css/index.css"> <link rel="stylesheet" href="css/perfil.css"> <link href="https://fonts.cdnfonts.com/css/sansation" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="imagem/pinguim.png" class="logo-pinguim" alt="Logo Pinguim">
            <span class="texto-nome">NEXUS<span class="ponto-laranja">.</span></span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="#">Calendário</a></li>
                <li><a href="#" style="color: #f77f00; font-weight: bold;">Meu Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main class="perfil-container">
        <section class="perfil-header">
            <div class="avatar-wrapper">
                <img src="https://ui-avatars.com/api/?name=User&background=2d2d2d&color=ff6b6b" id="foto-perfil" alt="Foto de Perfil">
                
                <div class="avatar-overlay" onclick="document.getElementById('input-foto').click()">
                    <span> Mudar</span>
                </div>
                <input type="file" id="input-foto" accept="image/*" style="display: none;">
            </div>
            
            <div class="perfil-title">
                <h1 id="nome-usuario-tela" class="titulo-sansation">Carregando...</h1>
                <p class="badge-estudante">Estudante Universitário</p>
            </div>
        </section>

        <div class="perfil-grid">
            <aside class="bio-card">
                <h2>Sobre Mim</h2>
                <div class="bio-content">
                    <p><strong> Curso:</strong> <span id="bio-curso">Ciência da Computação</span></p>
                    <p><strong> Instituição:</strong> <span id="bio-uni">UNAMA</span></p>
                    <p><strong>📅 Semestre:</strong> <span id="bio-sem">3º Semestre</span></p>
                    <p><strong> Interesses:</strong> <span id="bio-int">UI/UX Design, Python, Java, SQL</span></p>
                </div>
                <button id="btn-editar-bio" class="btn-secondary">Editar Biografia</button>
            </aside>

            <section class="favoritos-card">
                <h2>Meus Eventos </h2>
               
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Nexus Tech Brasil - Conectando mentes brilhantes.</p>
    </footer>

    <script src="js/perfil.js"></script>
</body>
</html>
