<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagem/favicon.ico" type="image/x-icon">
    <title>Nexus | Acesse Sua Conta</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.cdnfonts.com/css/sansation" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="imagem/pinguim.png" class="logo-pinguim" alt="Logo Pinguim">
            <span class="texto-nome">NEXUS<span class="ponto-laranja">.</span></span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="#">Calendário</a></li>
                <li><a href="#">Submeter Evento</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-container">
        <div class="auth-box">
            
            <section class="login-section" id="tela-login">
                <h2 class="titulo-sansation">Login</h2>
                <form id="form-login">
                    <input type="email" id="login-email" placeholder="Seu E-mail" required>
                    <input type="password" id="login-senha" placeholder="Sua Senha" required>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
                <p class="trocar-tela">Primeira vez aqui? <a href="#" id="link-ir-registro">Registre-se</a></p>
            </section>

            <section class="register-section" id="tela-registro" style="display: none;">
                <h2 class="titulo-sansation">Registro</h2>
                <form id="form-registro">
                    <input type="text" id="reg-nome" placeholder="Seu Nome" required>
                    <input type="email" id="reg-email" placeholder="Seu E-mail" required>
                    <input type="password" id="reg-senha" placeholder="Sua Senha" required>
                    <button type="submit" class="btn-primary">Criar Conta</button>
                </form>
                <p class="trocar-tela">Já tem uma conta? <a href="#" id="link-ir-login">Entre aqui</a></p>
            </section>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Nexus Tech Brasil - Conectando mentes brilhantes.</p>
    </footer>

    <script src="js/registro.js"></script>

</body>
</html>
